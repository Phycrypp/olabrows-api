name: Deploy Olabrows API

on:
  push:
    branches: [main]

env:
  BLUE_SERVER: 54.85.135.163
  GREEN_SERVER: 3.239.170.164

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

     - name: Create application.properties
        run: |
          cat > src/main/resources/application.properties << PROPS
          server.port=8081
          spring.datasource.url=jdbc:mysql://${{ secrets.DB_HOST }}:3306/olabrows
          spring.datasource.username=${{ secrets.DB_USER }}
          spring.datasource.password=${{ secrets.DB_PASSWORD }}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=false
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
          spring.mail.host=email-smtp.us-east-1.amazonaws.com
          spring.mail.port=587
          spring.mail.username=${{ secrets.SES_USERNAME }}
          spring.mail.password=${{ secrets.SES_PASSWORD }}
          spring.mail.properties.mail.smtp.auth=true
          spring.mail.properties.mail.smtp.starttls.enable=true
          app.name=Browed by Ola
          app.email=hello@olabrows.store
          anthropic.api.key=${{ secrets.ANTHROPIC_API_KEY }}
          stripe.secret.key=${{ secrets.STRIPE_SECRET_KEY }}
          PROPS
      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Deploy to Blue server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.BLUE_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/olabrows-api-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/

      - name: Restart API on Blue server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.BLUE_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv -f /home/ec2-user/target/olabrows-api-0.0.1-SNAPSHOT.jar /home/ec2-user/olabrows-api-0.0.1-SNAPSHOT.jar
            sudo systemctl restart olabrows-api
            sleep 40
            sudo journalctl -u olabrows-api -n 10 --no-pager
            curl -f http://localhost:8081/api/products || exit 1

      - name: Deploy to Green server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.GREEN_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/olabrows-api-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/

      - name: Restart API on Green server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.GREEN_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv -f /home/ec2-user/target/olabrows-api-0.0.1-SNAPSHOT.jar /home/ec2-user/olabrows-api-0.0.1-SNAPSHOT.jar
            sudo systemctl restart olabrows-api
            sleep 40
            sudo journalctl -u olabrows-api -n 10 --no-pager
            curl -f http://localhost:8081/api/products || exit 1
