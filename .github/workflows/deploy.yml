name: Deploy Olabrows API

on:
  push:
    branches: [main]

env:
  BLUE_SERVER: 54.85.135.163
  GREEN_SERVER: 3.239.170.164

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Deploy to Blue server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.BLUE_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/olabrows-api-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/

      - name: Restart API on Blue server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.BLUE_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv /home/ec2-user/target/olabrows-api-0.0.1-SNAPSHOT.jar /home/ec2-user/olabrows-api-0.0.1-SNAPSHOT.jar
            sudo systemctl restart olabrows-api
            sleep 20
            curl -f http://localhost:8081/api/products || exit 1

      - name: Deploy to Green server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.GREEN_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/olabrows-api-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/

      - name: Restart API on Green server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.GREEN_SERVER }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mv /home/ec2-user/target/olabrows-api-0.0.1-SNAPSHOT.jar /home/ec2-user/olabrows-api-0.0.1-SNAPSHOT.jar
            sudo systemctl restart olabrows-api
            sleep 20
            curl -f http://localhost:8081/api/products || exit 1
